<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Isometric Room - MVP Slice</title>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #d9dce2;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      /* START + END MENU OVERLAY */

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(18, 20, 24, 0.72);
        color: #f5f7fa;
      }

      .hidden {
        display: none;
      }

      /* HUD PANEL */

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        min-width: 290px;
        padding: 12px;
        border-radius: 10px;
        background: rgba(23, 26, 30, 0.8);
        color: #f5f7fa;
        font-size: 13px;
        line-height: 1.4;
      }

      #hud b.title {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 4px 0;
      }

      .label {
        opacity: 0.82;
      }

      .value {
        font-weight: 700;
      }

      /* MESS METER */

      #messMeterWrap {
        margin-top: 6px;
      }

      #messMeter {
        width: 100%;
        height: 12px;
        background: #2e3137;
        border-radius: 6px;
        overflow: hidden;
        margin-top: 4px;
      }

      #messFill {
        height: 100%;
        width: 0%;
        background: #5fd36a;
        transition: width 0.2s ease;
      }

      /* BUTTONS */

      #hudButtons {
        margin-top: 8px;
        display: flex;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 7px 10px;
        font-weight: 700;
        cursor: pointer;
      }

      #catnipBtn {
        background: #79b87f;
        color: #102312;
      }

      #restartBtn {
        background: #d28888;
        color: #251010;
      }

      #debugBtn {
        background: #f0b861;
        color: #2a1a07;
      }

      #modeBtn {
        background: #8f9cb4;
        color: #101726;
      }

      #result {
        margin-top: 8px;
        font-weight: 800;
        min-height: 18px;
      }
    </style>
  </head>

  <body>
    <!-- START MENU -->

    <div id="startMenu" class="overlay">
      <h1>Cat Cleanup</h1>
      <button id="playBtn" type="button">Play</button>
      <button id="startModeBtn" type="button">Mode: Casual</button>
      <button id="quitBtn" type="button">Quit</button>
    </div>
    

    <!-- END MENU -->

    <div id="endMenu" class="overlay hidden">
      <h2 id="endTitle">Game Over</h2>
      <button id="replayBtn" type="button">Replay</button>
    </div>

    <!-- HUD -->

    <div id="hud">
      <b class="title">MVP Room Slice</b>

      <div class="row">
        <span class="label">Items sorted</span>
        <span class="value" id="sortedStat">0 / 0</span>
      </div>

      <div class="row">
        <span class="label">Cat state</span>
        <span class="value" id="catStateStat">Patrolling</span>
      </div>

      <div class="row">
        <span class="label">Cup status</span>
        <span class="value" id="cupStat">On desk</span>
      </div>

      <div class="row">
        <span class="label">Catnip</span>
        <span class="value" id="catnipStat">Ready</span>
      </div>

      <div class="row">
        <span class="label">Mode</span>
        <span class="value" id="modeStat">Casual</span>
      </div>

      <!-- MESS METER -->

      <div id="messMeterWrap">
        <div class="row">
          <span class="label">Mess Level</span>
          <span class="value" id="messValue">0%</span>
        </div>

        <div id="messMeter">
          <div id="messFill"></div>
        </div>
      </div>

      <!-- BUTTONS -->

      <div id="hudButtons">
        <button id="catnipBtn" type="button">Place Catnip</button>
        <button id="restartBtn" type="button">Restart</button>
        <button id="modeBtn" type="button">Switch To Casual</button>
        <button id="debugBtn" type="button">Debug: Off (B)</button>
      </div>

      <div id="result"></div>
    </div>

    <script type="module" src="/src/mvp/main.js"></script>
  </body>
</html>
